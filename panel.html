<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
    /* Dark theme */
    * { box-sizing: border-box; }
    html, body {
        height: 100%;
        margin: 0;
        padding: 0;
    }
    body {
        background: #1e1e1e;
        color: #d4d4d4;
        font-family: 'Segoe UI', monospace;
        display: flex;
        flex-direction: column;
    }
    #toolbar {
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 4px 6px;
        background: #252526;
        border-bottom: 1px solid #3a3a3a;
        flex-shrink: 0;
    }
    #toolbar .sep {
        width: 1px;
        height: 18px;
        background: #444;
        margin: 0 2px;
    }
    #status {
        margin-left: auto;
        padding: 2px 8px;
        border-radius: 3px;
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 55%;
    }
    #status.ok {
        background: #1e3a1e;
        color: #8bc34a;
    }
    #status.error {
        background: #3a1e1e;
        color: #f48771;
    }
    #status.info {
        background: #1e2a3a;
        color: #9cdcfe;
    }
    button {
        background: #2d2d2d;
        color: #d4d4d4;
        border: 1px solid #444;
        padding: 3px 10px;
        cursor: pointer;
        border-radius: 3px;
        font-size: 12px;
        white-space: nowrap;
        flex-shrink: 0;
    }
    button:hover {
        background: #3a3a3a;
    }
    button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
    }
    #table-wrap {
        flex: 1;
        overflow-y: auto;
    }
    table {
        width: 100%;
        border-collapse: collapse;
    }
    th, td {
        border: 1px solid #444;
        padding: 6px;
        text-align: left;
    }
    th {
        background: #2d2d2d;
        color: #b0b0b0;
        position: sticky;
        top: 0;
        z-index: 1;
    }
    tr:hover {
        background: #2a2a2a;
    }
    td {
        color: #d4d4d4;
    }
    .vuln-url {
        color: #9cdcfe;
        word-break: break-all;
    }
    .vuln-line {
        color: #b5cea8;
    }
    .vuln-details {
        color: #d7ba7d;
    }
    .vuln-num {
        color: #555;
        font-size: 11px;
        text-align: center;
        white-space: nowrap;
        width: 28px;
        user-select: none;
    }
    .vuln-type {
        white-space: nowrap;
    }
    .type-icon {
        font-size: 15px;
        margin-right: 5px;
        vertical-align: middle;
    }
    .type-label {
        font-weight: bold;
        vertical-align: middle;
    }
    .type-postmessage .type-label { color: #f48771; }
    .type-listener    .type-label { color: #ce9178; }
    .type-weakorigin  .type-label { color: #dcdcaa; }
    .type-unresolved  .type-label { color: #9cdcfe; }
    .btn-log {
        background: #3d3d3d;
        border: 1px solid #666;
        padding: 2px 8px;
        border-radius: 3px;
        cursor: pointer;
        color: #ccc;
        font-size: 12px;
    }
    .btn-log:hover {
        background: #555;
        color: #fff;
    }
</style>
</head>
<body>

<div id="toolbar">
    <button id="start">▶ Start</button>
    <button id="stop" disabled>■ Stop</button>
    <div class="sep"></div>
    <button id="clear">Clear</button>
    <button id="export">Export JSON</button>
    <div id="status"></div>
</div>

<div id="table-wrap">
<table>
<thead>
<tr><th style="width:28px">#</th><th>Type</th><th>URL</th><th>Line:Col</th><th>Details</th><th>Action</th></tr>
</thead>
<tbody id="results"></tbody>
</table>
</div>

<script src="libs/babel.min.js"></script>
<script src="libs/acorn.js"></script>
<script src="libs/acorn-loose.js"></script>
<script src="scanner.js"></script>
<script src="panel.js"></script>
</body>
</html>
